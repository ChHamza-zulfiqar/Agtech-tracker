<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgTech AI Journey</title>
    <!-- Links your application to the PWA android configurations -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #2ecc71;
            --link-color: #3498db;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1 { color: var(--accent-color); text-align: center; }
        .phase-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
        }
        .topic-block {
            margin-top: 15px;
            padding-left: 10px;
        }
        a { color: var(--link-color); text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <h1>🌱 AgTech AI Journey Tracker</h1>
    
    <!-- Dynamic Resources injection hub -->
    <div id="resource-library-container"></div>

    <!-- Scripts linking structure -->
    <script src="ai_studio_code.js"></script>
    <script>
        // Registers your background service worker for Android PWA criteria
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.log('Registration Failed', err));
            });
        }
    </script>
</body>
</html>
