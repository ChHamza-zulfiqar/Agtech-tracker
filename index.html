<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgTech AI Journey Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #111827 0%, #030712 100%);
            --panel-glass: rgba(31, 41, 55, 0.45);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --link-neon: #38bdf8;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 24px 0 12px 0;
        }

        header h1 {
            font-size: 1.8rem;
            color: #ffffff;
            margin: 0 0 6px 0;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.9rem;
        }

        /* Dashboard UI Component */
        .dashboard-card {
            background: var(--panel-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 15px;
        }

        .metric-box {
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .metric-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-glow);
            display: block;
        }

        .metric-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        /* Roadmap Phase Component Container */
        .phase-card {
            background: var(--panel-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .phase-title {
            font-size: 1.2rem;
            margin: 0 0 12px 0;
            color: #ffffff;
            border-left: 4px solid var(--accent-glow);
            padding-left: 10px;
        }

        .topic-wrapper {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .topic-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .topic-identity {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topic-title {
            font-weight: 600;
            margin: 0;
            font-size: 1rem;
        }

        .channel-anchor {
            color: var(--link-neon);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .resource-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .resource-link {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        .resource-link:hover {
            color: var(--link-neon);
        }

        .milestone-container {
            margin-top: 10px;
            border-top: 1px dashed var(--border-glass);
            padding-top: 8px;
        }

        .milestone-tag {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin: 4px 4px 0 0;
        }

        /* Checkbox Custom Inputs Styling */
        input[type="checkbox"] {
            accent-color: var(--accent-glow);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌱 AgTech AI Journey</h1>
        <p>Plant Breeding & Genetics Mastery Platform</p>
    </header>

    <!-- Catchy Status Dashboard Section -->
    <div class="dashboard-card">
        <span class="metric-lbl">Overall Syllabus Track</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
            <span id="progress-text-pct" style="font-weight:700; font-size:1.1rem;">0% Complete</span>
            <span id="progress-fraction" style="color:var(--text-muted); font-size:0.85rem;">0/0 Completed</span>
        </div>
        <div class="progress-container">
            <div id="main-progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="dashboard-grid">
            <div class="metric-box">
                <span class="metric-val" id="streak-count">1</span>
                <span class="metric-lbl">Day Streak 🔥</span>
            </div>
            <div class="metric-box">
                <span class="metric-val">3.70</span>
                <span class="metric-lbl">Target MSc Tier</span>
            </div>
        </div>
    </div>

    <!-- Active Interface Engine Node Placement -->
    <div id="dynamic-pipeline-container"></div>

    <script src="ai_studio_code.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('S23 Ultra PWA Engine Initialized.', reg))
                    .catch(err => console.error('Service Worker Registry Interrupted.', err));
            });
        }
    </script>
</body>
</html>
